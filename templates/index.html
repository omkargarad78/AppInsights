<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>App Insights Generator</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        /* Keyframes for smooth gradient transitions */
        @keyframes gradientBackground {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        /* Gradient animation for the background */
        body {
            background: linear-gradient(135deg, #fdfbfb, #ebedee, #dff1f7, #f3e9f1, #f9f9f9);
            background-size: 400% 400%;
            animation: gradientBackground 15s ease infinite;
        }
    </style>
</head>
<body class="min-h-screen flex items-center justify-center text-gray-800">
    <div class="max-w-lg w-full mx-auto bg-white rounded-2xl shadow-lg overflow-hidden">
        <!-- Header -->
        <div class="bg-gradient-to-r from-blue-100 to-indigo-200 p-6 text-center">
            <h1 class="text-3xl font-extrabold text-indigo-800">App Insights Generator</h1>
            <p class="mt-2 text-indigo-600 text-sm">
                Enter a topic to generate actionable insights and improve your product.
            </p>
        </div>
        
        <!-- Form -->
        <div class="p-8 flex flex-col space-y-6">
            <form method="POST" action="/generate_insights" class="relative" onsubmit="showLoadingSpinner(event)">
                <label for="topic" class="block text-lg font-medium text-gray-700 mb-2">Enter a Topic:</label>
                <input
                    type="text"
                    id="topic"
                    name="topic"
                    placeholder="e.g., meditation, fitness"
                    class="w-full bg-gray-50 border border-gray-300 rounded-lg p-4 focus:outline-none focus:ring focus:ring-indigo-300 shadow-sm"
                    required
                />
                <button
                    type="submit"
                    id="submitButton"
                    class="mt-6 w-full bg-indigo-500 text-white font-semibold py-3 px-4 rounded-lg transition-all duration-300 hover:bg-indigo-400 flex justify-center items-center gap-3"
                >
                    <span id="buttonText">Generate Insights</span>
                    <svg 
                        id="loadingSpinner" 
                        class="hidden w-5 h-5 animate-spin text-white" 
                        xmlns="http://www.w3.org/2000/svg" 
                        fill="none" 
                        viewBox="0 0 24 24"
                    >
                        <circle 
                            class="opacity-25" 
                            cx="12" 
                            cy="12" 
                            r="10" 
                            stroke="currentColor" 
                            stroke-width="4"
                        ></circle>
                        <path 
                            class="opacity-75" 
                            fill="currentColor" 
                            d="M4 12a8 8 0 018-8v8H4z"
                        ></path>
                    </svg>
                </button>
            </form>
        </div>

        <!-- Footer -->
        <div class="bg-gray-100 p-4 text-center text-sm text-gray-500">
            &copy; 2025 App Insights. All rights reserved.
        </div>
    </div>

    <script>
        function showLoadingSpinner(event) {
            // Prevent form submission
            event.preventDefault();

            // Disable the button and show the spinner
            const button = document.getElementById("submitButton");
            const buttonText = document.getElementById("buttonText");
            const loadingSpinner = document.getElementById("loadingSpinner");

            button.disabled = true;
            buttonText.textContent = "Generating...";
            loadingSpinner.classList.remove("hidden");

            // Simulate server processing
            setTimeout(() => {
                button.disabled = false;
                buttonText.textContent = "Generate Insights";
                loadingSpinner.classList.add("hidden");

                // Submit the form programmatically after delay
                event.target.submit();
            }, 3000); // Adjust delay for backend processing time
        }
    </script>
</body>
</html>
